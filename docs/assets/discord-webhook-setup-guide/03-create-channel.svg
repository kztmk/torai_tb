<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="700" viewBox="0 0 1120 700" role="img" aria-labelledby="title desc">
  <title id="title">Discordチャンネル作成画面の例</title>
  <desc id="desc">テキストチャンネルのプラスボタンから通知用チャンネルを作成する画面例。</desc>
  <rect width="1120" height="700" fill="#eef1f7"/>
  <rect x="60" y="55" width="1000" height="590" rx="16" fill="#313338"/>
  <rect x="60" y="55" width="88" height="590" rx="16" fill="#1e1f22"/>
  <rect x="148" y="55" width="260" height="590" fill="#2b2d31"/>
  <text x="180" y="105" fill="#ffffff" font-family="Arial, sans-serif" font-size="22" font-weight="700">虎威 通知</text>
  <text x="180" y="170" fill="#b5bac1" font-family="Arial, sans-serif" font-size="16" font-weight="700">テキストチャンネル</text>
  <text x="363" y="174" fill="#ffffff" font-family="Arial, sans-serif" font-size="25" font-weight="700">+</text>
  <rect x="520" y="130" width="420" height="400" rx="18" fill="#ffffff"/>
  <text x="575" y="190" fill="#23272a" font-family="Arial, sans-serif" font-size="28" font-weight="700">チャンネルを作成</text>
  <rect x="585" y="240" width="280" height="44" rx="22" fill="#e3e5e8"/>
  <circle cx="618" cy="262" r="13" fill="#5865f2"/>
