  <text x="585" y="336" fill="#4e5058" font-family="Arial, sans-serif" font-size="16" font-weight="700">チャンネル名</text>
  <rect x="585" y="356" width="280" height="50" rx="8" fill="#f2f3f5" stroke="#d5d8de"/>
  <text x="610" y="388" fill="#23272a" font-family="Arial, sans-serif" font-size="18">torai-notifications</text>
  <rect x="663" y="446" width="202" height="48" rx="8" fill="#5865f2"/>
  <text x="694" y="477" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="700">チャンネルを作成</text>
  <path d="M385 166h125" stroke="#5865f2" stroke-width="5" stroke-linecap="round"/>
