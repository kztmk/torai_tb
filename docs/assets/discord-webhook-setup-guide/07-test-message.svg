<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="700" viewBox="0 0 1120 700" role="img" aria-labelledby="title desc">
  <title id="title">Discordチャンネルにテストメッセージが届いた例</title>
  <desc id="desc">通知用チャンネルに虎威からのテストメッセージが表示されている画面例。</desc>
  <rect width="1120" height="700" fill="#eef1f7"/>
  <rect x="60" y="55" width="1000" height="590" rx="16" fill="#313338"/>
  <rect x="60" y="55" width="88" height="590" rx="16" fill="#1e1f22"/>
  <rect x="148" y="55" width="260" height="590" fill="#2b2d31"/>
  <text x="180" y="105" fill="#ffffff" font-family="Arial, sans-serif" font-size="22" font-weight="700">虎威 通知</text>
  <text x="180" y="175" fill="#ffffff" font-family="Arial, sans-serif" font-size="18"># torai-notifications</text>
  <text x="445" y="115" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="700"># torai-notifications</text>
  <line x1="408" y1="145" x2="1060" y2="145" stroke="#3f4147"/>
  <circle cx="465" cy="240" r="24" fill="#2563eb"/>
  <text x="455" y="249" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="700">虎</text>
  <text x="505" y="232" fill="#ffffff" font-family="Arial, sans-serif" font-size="19" font-weight="700">虎威</text>
  <rect x="555" y="215" width="44" height="22" rx="11" fill="#5865f2"/>
  <text x="565" y="231" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="700">BOT</text>
  <text x="505" y="268" fill="#dcdee1" font-family="Arial, sans-serif" font-size="18">Discord通知のテストメッセージです。</text>
  <text x="505" y="302" fill="#b5bac1" font-family="Arial, sans-serif" font-size="16">このメッセージが表示されれば設定は成功です。</text>
  <rect x="505" y="350" width="430" height="84" rx="10" fill="#2b2d31" stroke="#3ba55d" stroke-width="4"/>
  <text x="535" y="385" fill="#3ba55d" font-family="Arial, sans-serif" font-size="18" font-weight="700">確認ポイント</text>
  <text x="535" y="415" fill="#dcdee1" font-family="Arial, sans-serif" font-size="16">通知用チャンネルにメッセージが表示されている</text>
</svg>
